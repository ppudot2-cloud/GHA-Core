name: 'Backup Solution'
description: 'Exports the currently installed solution from the target environment as a pre-deploy backup'

inputs:
  solution_name:
    description: 'Name of the solution to back up'
    required: true
  environment_url:
    description: 'Target Power Platform environment URL'
    required: true
  environment_name:
    description: 'Environment label used in backup artifact name (e.g. UAT)'
    required: true
  run_number:
    description: 'GitHub run number — included in artifact name so rollback can locate the right backup'
    required: true
  enable_backup:
    description: 'If false, skip the backup step entirely'
    required: false
    default: 'true'
  mock_deploy:
    description: 'If true, simulate backup without connecting to Power Platform'
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Export backup (real)
      if: ${{ inputs.enable_backup == 'true' && inputs.mock_deploy != 'true' }}
      uses: microsoft/powerplatform-actions/export-solution@v1
      with:
        environment-url: ${{ inputs.environment_url }}
        app-id: ${{ env.PP_APP_ID }}
        client-secret: ${{ env.PP_CLIENT_SECRET }}
        tenant-id: ${{ env.PP_TENANT_ID }}
        solution-name: ${{ inputs.solution_name }}
        solution-output-file: backup/${{ inputs.solution_name }}_${{ inputs.environment_name }}_backup.zip
        managed: true

    - name: Upload backup artifact
      if: ${{ inputs.enable_backup == 'true' && inputs.mock_deploy != 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: backup-${{ inputs.solution_name }}-${{ inputs.environment_name }}-v${{ inputs.run_number }}
        path: backup/${{ inputs.solution_name }}_${{ inputs.environment_name }}_backup.zip
        retention-days: 30

    - name: Backup (mock)
      if: ${{ inputs.enable_backup == 'true' && inputs.mock_deploy == 'true' }}
      shell: pwsh
      run: |
        Write-Host "[MOCK] Backup of '${{ inputs.solution_name }}' from ${{ inputs.environment_name }} simulated." -ForegroundColor Cyan

    - name: Backup skipped
      if: ${{ inputs.enable_backup != 'true' }}
      shell: pwsh
      run: |
        Write-Host "Backup disabled (enable_backup=false) — skipping." -ForegroundColor Yellow
