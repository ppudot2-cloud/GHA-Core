# =============================================================================
# GLOBAL PIPELINE VARIABLES — GHA-Core
# =============================================================================
# These variables apply to ALL projects that consume GHA-Core reusable workflows.
#
# GOVERNANCE RULES:
#   • protected_keys  : variables that project repos (GHA-Dynamics) CANNOT override.
#                       Any key listed here is enforced by Merge-Variables.ps1.
#   • variables       : default values used when no project-level override exists.
#
# HOW VARIABLES REACH THE PIPELINE:
#   At the start of each reusable workflow, Merge-Variables.ps1 is executed.
#   It reads this file (from the GHA-Core checkout) and the project's
#   project-vars.yml, merges them (project adds/overrides non-protected keys),
#   and writes the result to $GITHUB_ENV so all subsequent steps can use
#   ${{ env.VAR_NAME }} syntax.
#
# PROJECT-LEVEL AZURE IDENTITY VALUES:
#   Each project has its own App Registration, Key Vault, and potentially its
#   own tenant. Set these as GitHub repository Variables on each project repo
#   (Settings → Variables): AZURE_CLIENT_ID, AZURE_TENANT_ID,
#   AZURE_SUBSCRIPTION_ID, AZURE_KEY_VAULT_NAME.
#   They are NOT in this file — they are sourced from vars.* at workflow start
#   and are intentionally NOT in protected_keys so each project can set them.
# =============================================================================

# ── Keys that project-level project-vars.yml CANNOT override ─────────────────
# Add any key here that must be consistent across all projects.
protected_keys:
  # These keys enforce org-wide consistency — project repos cannot override them.
  # Azure identity (AZURE_*) and GHA-Core location are intentionally NOT protected:
  # each project has its own Key Vault, App Registration, and GHA-Core reference.
  - PP_CHECKER_GEO            # Solution Checker geography — org-wide consistency
  - PP_CHECKER_ERROR_LEVEL    # Minimum severity that fails the build — security gate
  - DEFAULT_SOLUTION_TYPE     # All solutions must be managed in upper environments
  - ENABLE_BACKUP             # Backups before deploy are mandatory — cannot be disabled

# ── Global default values ─────────────────────────────────────────────────────
variables:
  # Power Platform — Solution Checker settings (enforced, org-wide)
  PP_CHECKER_GEO:         "UnitedStates"
  PP_CHECKER_ERROR_LEVEL: "HighIssue"

  # JFrog Artifactory — default repo name (project can override via project-vars.yml)
  JFROG_REPO: "powerplatform-solutions"

  # Deploy defaults (enforced — prevents projects from disabling safety gates)
  DEFAULT_SOLUTION_TYPE:  "managed"
  ENABLE_BACKUP:          "true"
  ENABLE_BLOCKING_CHECK:  "true"
  MOCK_DEPLOY:            "false"

  # Pipeline behaviour — projects CAN override these (not in protected_keys)
  SOLUTION_IMPORT_MAX_WAIT_MINUTES: "60"
  SOLUTION_CHECKER_TIMEOUT_MINUTES: "10"
  JFROG_UPLOAD_ENABLED: "true"
