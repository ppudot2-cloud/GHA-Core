# ─────────────────────────────────────────────────────────────────────────────
# _stage-export.yml  —  Reusable EXPORT STAGE
#
# Fans out per solution (parallel) and for each solution:
#   1. ci-bootstrap    – checkout, Azure OIDC login, AKV secrets, merge vars
#   2. pac-install     – install PAC CLI
#   3. export-solution – export unmanaged ZIP from sandbox, unpack to source tree
#   4. upload-artifact – upload unpacked source as exported-source-<name> artifact
#
# After all exports complete:
#   5. commit – create feature/pipeline-{run_number} from origin/main, copy
#               exported source, write pipeline-context.json, push to origin.
#               Git operations are always real — mock_deploy only suppresses PP imports.
#
# Outputs:
#   feature_branch – the branch name created and pushed by the commit job
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_call:
    inputs:
      matrix:
        description: 'JSON array of solution objects from the setup job'
        required: true
        type: string
      source_environment_url:
        description: 'Power Platform sandbox URL to export solutions from'
        required: true
        type: string
      mock_deploy:
        description: 'Simulate export (no real PP connection) — git operations still run'
        required: false
        type: boolean
        default: false
      solution_list:
        description: 'Comma-separated solution names — used by the commit job to copy source trees'
        required: true
        type: string

    outputs:
      feature_branch:
        description: 'Feature branch created and pushed by the commit job'
        value: ${{ jobs.commit.outputs.feature_branch }}

jobs:
  export:
    name: "📤 Export | ${{ matrix.solution.name }}"
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(inputs.matrix) }}
      fail-fast: false   # export failures are isolated per solution

    env:
      GHA_CORE_PAT: ${{ secrets.GHA_CORE_PAT }}

    steps:
      # ── 1. Bootstrap ──────────────────────────────────────────────────────────
      - name: CI Bootstrap
        uses: ppudot2-cloud/GHA-Core/.github/actions/ci-bootstrap@main
        with:
          mock_deploy:            ${{ inputs.mock_deploy }}
          jfrog_enabled:          false
          azure_client_id:        ${{ vars.AZURE_CLIENT_ID }}
          azure_tenant_id:        ${{ vars.AZURE_TENANT_ID }}
          azure_subscription_id:  ${{ vars.AZURE_SUBSCRIPTION_ID }}
          azure_key_vault_name:   ${{ vars.AZURE_KEY_VAULT_NAME }}

      # ── 2. Install PAC CLI ────────────────────────────────────────────────────
      - name: Install PAC CLI
        uses: ppudot2-cloud/GHA-Core/.github/actions/pac-install@main

      # ── 3. Export solution from sandbox ───────────────────────────────────────
      - name: Export Solution
        id: export
        uses: ppudot2-cloud/GHA-Core/.github/actions/export-solution@main
        with:
          solution_name:          ${{ matrix.solution.name }}
          source_environment_url: ${{ inputs.source_environment_url }}
          export_folder:          export-src
          mock_deploy:            ${{ inputs.mock_deploy }}

      # ── 4. Upload unpacked source as artifact for build stage ─────────────────
      - name: Upload exported source
        uses: actions/upload-artifact@v4
        with:
          name: exported-source-${{ matrix.solution.name }}
          # Upload the unpacked source tree so build stage can pack+version-stamp it
          path: ${{ steps.export.outputs.source_folder }}/${{ matrix.solution.name }}/
          retention-days: 1   # short-lived — only needed within the same pipeline run
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # commit  —  runs after ALL export jobs finish
  #
  # Creates feature/pipeline-{run_number} from origin/main, copies the exported
  # source trees, writes pipeline-context.json, and pushes. Always real git —
  # mock_deploy only suppresses Power Platform imports, not git operations.
  # ─────────────────────────────────────────────────────────────────────────────
  commit:
    name: "🌿 Commit to feature/pipeline-${{ github.run_number }}"
    needs: [export]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions:  read      # needed by download-artifact@v4 in same run

    outputs:
      feature_branch: ${{ steps.push.outputs.feature_branch }}

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download all exported source artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: exported-source-*
          path: _export-src/
          merge-multiple: false

      - name: Create branch, copy source, write context, push
        id: push
        shell: pwsh
        run: |
          $isMock     = '${{ inputs.mock_deploy }}' -eq 'true'
          $runNumber  = '${{ github.run_number }}'
          $runAttempt = '${{ github.run_attempt }}'
          $runId      = '${{ github.run_id }}'
          $branch     = "feature/pipeline-$runNumber"

          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"

          # Always branch from the latest main
          git fetch origin main
          git checkout -b $branch origin/main
          Write-Host "  ✓ Created branch $branch from origin/main"

          $solutions = '${{ inputs.solution_list }}' -split ',' |
            ForEach-Object { $_.Trim() } | Where-Object { $_ }

          foreach ($sol in $solutions) {
            $srcDir = "_export-src/exported-source-$sol"
            $dstDir = "src/solutions/$sol"
            if (Test-Path $srcDir) {
              if (Test-Path $dstDir) { Remove-Item $dstDir -Recurse -Force }
              Copy-Item $srcDir $dstDir -Recurse -Force
              Write-Host "  ✓ Copied $sol → src/solutions/$sol/"
            } else {
              Write-Warning "  ⚠ Exported source not found for $sol at $srcDir — using existing tree"
            }
          }

          # Write a per-run export marker inside every solution folder.
          # This guarantees the feature branch always has at least one commit ahead of
          # main — even in mock mode where the solution source is unchanged — so that
          # gh pr create never fails with "nothing to merge".
          foreach ($sol in $solutions) {
            $markerDir = "src/solutions/$sol"
            if (Test-Path $markerDir) {
              $exportMode = if ($isMock) { 'mock (source unchanged, simulated export)' } else { 'real (exported from sandbox)' }
              $marker = [ordered]@{
                pipelineRunId      = $runId
                pipelineRunNumber  = [int]$runNumber
                pipelineRunAttempt = [int]$runAttempt
                exportMode         = $exportMode
                exportedAt         = (Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ')
                exportedBy         = '${{ github.actor }}'
                sandboxUrl         = '${{ inputs.source_environment_url }}'
              }
              $marker | ConvertTo-Json | Set-Content "$markerDir/.pipeline-export.json" -Encoding UTF8
              Write-Host "  ✓ Written export marker → $markerDir/.pipeline-export.json"
            }
          }

          # pipeline-context.json — read by Pipeline 2 to locate Phase 1 artifacts
          $ctx = [ordered]@{
            runId         = $runId
            runNumber     = $runNumber
            runAttempt    = $runAttempt
            solutions     = $solutions
            solutionList  = '${{ inputs.solution_list }}'
            matrix        = '${{ inputs.matrix }}'
            featureBranch = $branch
            triggeredBy   = '${{ github.actor }}'
            triggeredAt   = (Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ')
            mockDeploy    = $isMock
          }
          $ctx | ConvertTo-Json -Depth 3 | Set-Content 'pipeline-context.json' -Encoding UTF8
          Write-Host "  ✓ Written pipeline-context.json (runId=$runId)"

          if (Test-Path '_export-src') { Remove-Item '_export-src' -Recurse -Force }

          git add src/solutions/ pipeline-context.json

          $status = git status --porcelain
          if ($status) {
            $mockTag = if ($isMock) { ' [mock]' } else { '' }
            $commitMsg = "chore: export from sandbox — pipeline run #$runNumber$mockTag [skip ci]"
            git commit -m $commitMsg
            Write-Host "  ✓ Committed: $commitMsg"
          } else {
            Write-Host "  ℹ No source changes — branch pointer only"
          }

          # Always push — mock_deploy only skips PP imports, not git operations
          git push origin $branch
          Write-Host "  ✓ Pushed branch $branch to origin"

          "feature_branch=$branch" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
