# =============================================================================
# REUSABLE WORKFLOW: Ad-hoc Deploy to Dev Environment
# =============================================================================
# Called by: GHA-Dynamics/.github/workflows/deploy-dev.yml (thin wrapper)
# Purpose  : One-click deploy to Dev without the full release pipeline.
#
# NOTE: vars.* do not cross repository boundaries in reusable workflows.
# All Power Platform URLs and repo-level config are passed as explicit inputs
# by the calling workflow, which reads them from its own vars context.
# =============================================================================

name: _reusable-deploy-dev

on:
  workflow_call:
    inputs:
      # ── User-facing dispatch inputs (forwarded from deploy-dev.yml) ─────────
      solutions:
        description: >
          Solutions to build and deploy.
          "all" = every solution in src/solutions/ (default).
          Comma-separated for a subset: "CoreSolution" or "CoreSolution, ExtA".
        required: false
        default: 'all'
        type: string

      enable-backup:
        description: 'Backup Dev before deploying'
        required: false
        default: false
        type: boolean

      enable-blocking-check:
        description: 'Warn on in-progress async operations before importing'
        required: false
        default: false
        type: boolean


      mock-deploy:
        description: 'Dry run — skip actual import'
        required: false
        default: false
        type: boolean

      import-config-data:
        description: 'Import config data after solution import'
        required: false
        default: false
        type: boolean

      # ── Repository variables (passed by caller — cannot read vars.* here) ──
      pp-dev-url:
        description: "Dev environment URL (caller passes vars.PP_DEV_URL)"
        required: true
        type: string

      pp-checker-geo:
        description: "Solution Checker geography (caller passes vars.PP_CHECKER_GEO)"
        required: false
        default: 'UnitedStates'
        type: string

      pp-checker-error-level:
        description: "Minimum severity that fails Solution Checker"
        required: false
        default: 'HighIssue'
        type: string

      pp-solution-name:
        description: "Fallback solution name when src/solutions/ is empty (caller passes vars.PP_SOLUTION_NAME)"
        required: false
        default: ''
        type: string

      pp-data-schema-file:
        description: "Config Migration schema path (caller passes vars.PP_DATA_SCHEMA_FILE)"
        required: false
        default: ''
        type: string

      pp-sdbx-url:
        description: "Sandbox environment URL for config data export (caller passes vars.PP_SDBX_URL)"
        required: false
        default: ''
        type: string

      jfrog-url:
        description: "JFrog Artifactory base URL (caller passes vars.JFROG_URL)"
        required: false
        default: ''
        type: string

      jfrog-repo:
        description: "JFrog Artifactory repository name (caller passes vars.JFROG_REPO)"
        required: false
        default: 'powerplatform-solutions'
        type: string

    secrets:
      APP_ID:
        required: false
      CLIENT_SECRET:
        required: false
      TENANT_ID:
        required: false
      JFROG_API_KEY:
        required: false
      GHA_CORE_PAT:
        required: false

jobs:
  # ============================================================================
  # JOB 0 ─ Setup
  # Discovers solutions from the calling repository's src/solutions/ folder.
  # actions/checkout without an explicit repository checks out the CALLER repo
  # (GHA-Dynamics), which is the correct behaviour here.
  # ============================================================================
  setup:
    name: "🔍 Resolve Solutions"
    runs-on: ubuntu-latest
    outputs:
      matrix:         ${{ steps.resolve.outputs.matrix }}
      solution-list:  ${{ steps.resolve.outputs.solution-list }}
      solution-count: ${{ steps.resolve.outputs.solution-count }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve solution list
        id: resolve
        shell: python3 {0}
        run: |
          import json, os, sys

          input_solutions  = "${{ inputs.solutions }}".strip()
          pp_solution_name = "${{ inputs.pp-solution-name }}".strip()
          solutions_dir    = "src/solutions"
          config_file      = ".github/solutions-config.json"

          discovered = []
          if os.path.isdir(solutions_dir):
              discovered = sorted([
                  d for d in os.listdir(solutions_dir)
                  if os.path.isdir(os.path.join(solutions_dir, d)) and not d.startswith(".")
              ])

          if input_solutions.lower() == "all":
              if discovered:
                  selected = discovered
              elif pp_solution_name:
                  selected = [pp_solution_name]
              else:
                  print("::error::No solutions found in src/solutions/ and pp-solution-name is not set.")
                  sys.exit(1)
          else:
              selected = [s.strip() for s in input_solutions.split(",") if s.strip()]
              if not selected:
                  print("::error::The 'solutions' input is empty.")
                  sys.exit(1)
              if discovered:
                  unknown = [s for s in selected if s not in discovered]
                  if unknown:
                      print(f"::error::Not found in {solutions_dir}/: {', '.join(unknown)}")
                      print(f"::error::Available: {', '.join(discovered)}")
                      sys.exit(1)

          if os.path.isfile(config_file):
              try:
                  with open(config_file) as f:
                      config = json.load(f)
                  selected_set = set(selected)
                  ordered = []
                  for entry in config.get("solutions", []):
                      name = entry["name"] if isinstance(entry, dict) else str(entry)
                      if name in selected_set:
                          ordered.append(name)
                          selected_set.discard(name)
                  ordered.extend(sorted(selected_set))
                  selected = ordered
              except Exception:
                  pass

          matrix        = json.dumps({"solution": selected})
          solution_list = ", ".join(selected)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={matrix}\n")
              f.write(f"solution-list={solution_list}\n")
              f.write(f"solution-count={len(selected)}\n")

          print(f"✅ {len(selected)} solution(s): {solution_list}")

  # ============================================================================
  # JOB 1 ─ Build (PARALLEL per solution)
  # ============================================================================
  build:
    name: "🏗️ Build | ${{ matrix.solution }}"
    needs: setup
    if: needs.setup.result == 'success'
    strategy:
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
      fail-fast: false
    uses: ppudot2-cloud/GHA-Core/.github/workflows/dynamics/jobs/_job-build.yml@main
    with:
      solution_name:          ${{ matrix.solution }}
      solution_source_folder: src/solutions/${{ matrix.solution }}
      checker_geo:            ${{ inputs.pp-checker-geo }}
      checker_error_level:    ${{ inputs.pp-checker-error-level }}
      data_schema_file:       ${{ inputs.pp-data-schema-file }}
      source_environment_url: ${{ inputs.pp-sdbx-url }}
      mock_deploy:            ${{ inputs.mock-deploy == true }}
      # enable_jfrog_upload removed — always mandatory in non-mock builds
      jfrog_url:              ${{ inputs.jfrog-url }}
      jfrog_repo:             ${{ inputs.jfrog-repo }}
    secrets: inherit

  # ============================================================================
  # JOB 2 ─ Deploy to Dev (Unmanaged) — SEQUENTIAL
  # ============================================================================
  deploy:
    name: "🚀 Dev [Unmanaged] | ${{ matrix.solution }}"
    needs: [setup, build]
    if: needs.build.result == 'success'
    strategy:
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
      max-parallel: 1
      fail-fast: false
    uses: ppudot2-cloud/GHA-Core/.github/workflows/dynamics/jobs/_job-deploy.yml@main
    with:
      environment_name:                   Dev
      environment_url:                    ${{ inputs.pp-dev-url }}
      solution_name:                      ${{ matrix.solution }}
      solution_type:                      unmanaged
      artifact_name:                      solution-${{ matrix.solution }}-${{ github.run_number }}
      enable_backup:                      ${{ inputs.enable-backup == true }}
      enable_blocking_check:              ${{ inputs.enable-blocking-check == true }}
      mock_deploy:                        ${{ inputs.mock-deploy == true }}
      trigger_upgrade:                    false
      overwrite_unmanaged_customizations: true
      import_config_data:                 ${{ inputs.import-config-data == true }}
      deployment_settings_file:           deployment-settings/dev/${{ matrix.solution }}.json
    secrets: inherit

  # ============================================================================
  # JOB 3 ─ Summary
  # ============================================================================
  summary:
    name: "📋 Summary"
    needs: [setup, build, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write summary
        shell: bash
        run: |
          icon() { case "$1" in success) echo "✅";; skipped) echo "⏭️";; *) echo "❌";; esac; }
          echo "# 🚀 Deploy to Dev — Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Solutions:** \`${{ needs.setup.outputs.solution-list }}\`  " >> "$GITHUB_STEP_SUMMARY"
          echo "**Run:** \`#${{ github.run_number }}\` | **Ref:** \`${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stage | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔍 Resolve (×${{ needs.setup.outputs.solution-count }}) | $(icon '${{ needs.setup.result }}') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏗️ Build | $(icon '${{ needs.build.result }}') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🚀 Deploy → Dev | $(icon '${{ needs.deploy.result }}') |" >> "$GITHUB_STEP_SUMMARY"
