# ─────────────────────────────────────────────────────────────────────────────
# _job-deploy.yml  —  Reusable DEPLOY job
#
# Orchestrates composite actions in templates/steps/dynamics/:
#   1. ci-bootstrap       – checkout, Azure login, AKV secrets, merge vars
#   2. pac-install        – install PAC CLI
#   3. resolve-settings   – download artifact from JFrog, resolve tokens
#   4. pre-deploy-checks  – blocking check, version compare
#   5. backup-solution    – export current solution as backup
#   6. import-solution    – standard or stage-and-upgrade import + config data
#   7. post-deploy        – publish customizations, JFrog tag, deploy summary
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_call:
    inputs:
      environment_name:
        description: 'Target environment label (Dev, Intg, UAT, FRS, Perf, Prod)'
        required: true
        type: string
      environment_url:
        description: 'Target Power Platform environment URL'
        required: true
        type: string
      solution_name:
        description: 'Name of the Power Platform solution'
        required: true
        type: string
      solution_type:
        description: 'Import type: Managed or Unmanaged'
        required: false
        type: string
        default: 'Managed'
      artifact_name:
        description: 'Artifact identifier from the build job (e.g. MySolution_1.0.20240101.1)'
        required: true
        type: string
      solution_version:
        description: 'Solution version string from the build job'
        required: true
        type: string
      trigger_upgrade:
        description: 'Use stage-and-upgrade (holding) pattern'
        required: false
        type: boolean
        default: false
      mock_deploy:
        description: 'Simulate the pipeline without Dataverse changes'
        required: false
        type: boolean
        default: false
      enable_backup:
        description: 'Export existing solution as backup before import'
        required: false
        type: boolean
        default: true
      enable_blocking_check:
        description: 'Run blocking-check script before import'
        required: false
        type: boolean
        default: true
      enable_version_compare:
        description: 'Skip import if same/higher version already installed'
        required: false
        type: boolean
        default: true
      previous_environment_url:
        description: 'URL of the environment promoted from (used for data export)'
        required: false
        type: string
        default: ''
      base_solutions:
        description: 'Comma-separated list of base solutions to verify are present'
        required: false
        type: string
        default: ''
      import_config_data:
        description: 'Import configuration migration data after solution import'
        required: false
        type: boolean
        default: false
      deployment_settings_file:
        description: 'Path to the deployment-settings JSON for this solution/environment'
        required: false
        type: string
        default: ''
      jfrog_url:
        description: 'JFrog Artifactory base URL'
        required: false
        type: string
        default: ''
      jfrog_repo:
        description: 'JFrog repository name'
        required: false
        type: string
        default: 'power-platform'
      tag_prod_deployed:
        description: 'Tag JFrog artifact with prodDeployed=true after success (Prod only)'
        required: false
        type: boolean
        default: false

jobs:
  deploy:
    name: Deploy ${{ inputs.solution_name }} → ${{ inputs.environment_name }}
    runs-on: ubuntu-latest

    env:
      GHA_CORE_PAT: ${{ secrets.GHA_CORE_PAT }}

    steps:
      # ── 1. Bootstrap ──────────────────────────────────────────────────────────
      - name: CI Bootstrap
        uses: ppudot2-cloud/GHA-Core/templates/steps/dynamics/ci-bootstrap@main
        with:
          mock_deploy:   ${{ inputs.mock_deploy }}
          jfrog_enabled: ${{ inputs.jfrog_url != '' }}

      # ── 2. Install PAC CLI ────────────────────────────────────────────────────
      - name: Install PAC CLI
        uses: ppudot2-cloud/GHA-Core/templates/steps/dynamics/pac-install@main

      # ── 3. Resolve settings & download artifact ───────────────────────────────
      - name: Resolve Deployment Settings
        id: resolve
        uses: ppudot2-cloud/GHA-Core/templates/steps/dynamics/resolve-settings@main
        with:
          solution_name:            ${{ inputs.solution_name }}
          artifact_name:            ${{ inputs.artifact_name }}
          environment_name:         ${{ inputs.environment_name }}
          deployment_settings_file: ${{ inputs.deployment_settings_file }}
          jfrog_url:                ${{ inputs.jfrog_url }}
          jfrog_repo:               ${{ inputs.jfrog_repo }}
          run_number:               ${{ github.run_number }}
          run_attempt:              ${{ github.run_attempt }}
          mock_deploy:              ${{ inputs.mock_deploy }}

      # ── 4. Pre-deploy checks ──────────────────────────────────────────────────
      - name: Pre-Deploy Checks
        id: pre-check
        uses: ppudot2-cloud/GHA-Core/templates/steps/dynamics/pre-deploy-checks@main
        with:
          solution_name:          ${{ inputs.solution_name }}
          environment_url:        ${{ inputs.environment_url }}
          artifact_name:          ${{ inputs.artifact_name }}
          enable_blocking_check:  ${{ inputs.enable_blocking_check }}
          enable_version_compare: ${{ inputs.enable_version_compare }}
          base_solutions:         ${{ inputs.base_solutions }}
          mock_deploy:            ${{ inputs.mock_deploy }}

      # ── 5. Backup current solution ────────────────────────────────────────────
      - name: Backup Solution
        uses: ppudot2-cloud/GHA-Core/templates/steps/dynamics/backup-solution@main
        with:
          solution_name:    ${{ inputs.solution_name }}
          environment_url:  ${{ inputs.environment_url }}
          environment_name: ${{ inputs.environment_name }}
          enable_backup:    ${{ inputs.enable_backup }}
          mock_deploy:      ${{ inputs.mock_deploy }}

      # ── 6. Import solution ────────────────────────────────────────────────────
      - name: Import Solution
        uses: ppudot2-cloud/GHA-Core/templates/steps/dynamics/import-solution@main
        with:
          solution_name:          ${{ inputs.solution_name }}
          managed_zip:            ${{ steps.resolve.outputs.managed_zip }}
          environment_url:        ${{ inputs.environment_url }}
          environment_name:       ${{ inputs.environment_name }}
          solution_type:          ${{ inputs.solution_type }}
          trigger_upgrade:        ${{ inputs.trigger_upgrade }}
          settings_file_resolved: ${{ steps.resolve.outputs.settings_file_resolved }}
          import_config_data:     ${{ inputs.import_config_data }}
          data_file:              config-data/${{ inputs.solution_name }}-data.zip
          mock_deploy:            ${{ inputs.mock_deploy }}
          skip_import:            ${{ steps.pre-check.outputs.skip_import }}

      # ── 7. Post-deploy ────────────────────────────────────────────────────────
      - name: Post-Deploy
        if: always()
        uses: ppudot2-cloud/GHA-Core/templates/steps/dynamics/post-deploy@main
        with:
          solution_name:     ${{ inputs.solution_name }}
          solution_version:  ${{ inputs.solution_version }}
          environment_name:  ${{ inputs.environment_name }}
          environment_url:   ${{ inputs.environment_url }}
          artifact_name:     ${{ inputs.artifact_name }}
          jfrog_url:         ${{ inputs.jfrog_url }}
          jfrog_repo:        ${{ inputs.jfrog_repo }}
          run_number:        ${{ github.run_number }}
          run_attempt:       ${{ github.run_attempt }}
          tag_prod_deployed: ${{ inputs.tag_prod_deployed }}
          mock_deploy:       ${{ inputs.mock_deploy }}
          skip_import:       ${{ steps.pre-check.outputs.skip_import }}
