# ─────────────────────────────────────────────────────────────────────────────
# _stage-deploy-chain.yml  —  Reusable DEPLOY CHAIN stage
#
# Drives sequential promotion:  Dev → Intg → UAT → FRS → Perf → Prod
#
# INPUT STRUCTURE — two layers:
#
#   Common inputs (apply to every environment):
#     matrix, mock_deploy, trigger_upgrade, base_solutions,
#     jfrog_url, jfrog_repo, run_number, run_attempt
#
#   Per-environment inputs (one named JSON string per environment):
#     dev_config, intg_config, uat_config, frs_config, perf_config, prod_config
#
#   Each *_config is a compact JSON object with these fields:
#     name                  — must match a GitHub Environment in repo Settings
#     url                   — Power Platform environment URL
#     previous_url          — URL of the prior environment (version-compare context)
#     solution_type         — "Unmanaged" (Dev) or "Managed" (all others)
#     enable_backup         — export current solution as backup before import
#     enable_blocking_check — block on active flows / ownership locks
#     enable_version_compare— skip import when installed version >= artifact version
#     import_config_data    — run pac data import after solution import
#
#   Example (as passed from combined-pipeline.yml):
#     dev_config:  '{"name":"Dev","url":"https://dev.crm.dynamics.com","previous_url":"",
#                   "solution_type":"Unmanaged","enable_backup":false,
#                   "enable_blocking_check":false,"enable_version_compare":false,
#                   "import_config_data":false}'
#
# HOW IT WORKS:
#   Job 1 — assemble-env-matrix
#     Parses the 6 per-env JSON inputs and emits an ordered env_matrix_json array.
#     Order is fixed: Dev → Intg → UAT → FRS → Perf → Prod.
#
#   Job 2 — deploy-env  (depends on assemble-env-matrix)
#     strategy.matrix over env_matrix_json with max-parallel:1 enforces strict
#     sequential promotion. environment: on the job IS the approval gate —
#     GitHub Environment protection rules pause execution for each env automatically.
#
# NESTING: combined-pipeline → this file → deploy-all-solutions (composite)
#          = 2 reusable-workflow levels  ✅ (limit is 4)
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_call:
    inputs:
      # ── Solution matrix (from setup job) ────────────────────────────────────
      matrix:
        description: 'JSON array of solution objects from the setup job'
        required: true
        type: string

      # ── Environment filter ────────────────────────────────────────────────────
      # Comma-separated list of environment names to include in this run.
      # Controls which of the 6 named *_config inputs actually get deployed.
      # Examples:  "Dev,Intg"       → Phase 1 (feature branch)
      #            "UAT,FRS,Perf"   → Phase 2 (release branch)
      #            "Prod"           → Phase 3 (main branch)
      # Default (empty) = deploy all 6 environments in sequence.
      environments:
        description: 'Comma-separated environment names to deploy (empty = all 6)'
        required: false
        type: string
        default: ''

      # ── Cross-run artifact source ─────────────────────────────────────────────
      # Phase 2/3 pass the run_id of the Phase 1 workflow run so solution artifacts
      # can be downloaded from that run instead of the current one.
      # Empty (default) = download from the current run.
      source_run_id:
        description: 'GitHub run ID to download solution artifacts from (empty = current run)'
        required: false
        type: string
        default: ''

      # ── Common options (apply to every environment) ──────────────────────────
      mock_deploy:
        description: 'Simulate all deployments without touching Power Platform'
        required: false
        type: boolean
        default: false
      trigger_upgrade:
        description: 'Use stage-and-upgrade (holding) pattern for managed imports'
        required: false
        type: boolean
        default: false
      base_solutions:
        description: 'Comma-separated base solution names to verify are installed'
        required: false
        type: string
        default: ''
      jfrog_url:
        description: 'JFrog Artifactory base URL (used only for Prod prodDeployed tagging)'
        required: false
        type: string
        default: ''
      jfrog_repo:
        description: 'JFrog repository name'
        required: false
        type: string
        default: 'power-platform'
      run_number:
        description: 'GitHub run number (for deterministic artifact naming)'
        required: true
        type: string
      run_attempt:
        description: 'GitHub run attempt'
        required: true
        type: string

      # ── Per-environment config inputs ────────────────────────────────────────
      # Each is a compact JSON object — see header comment for field reference.
      # Edit these in combined-pipeline.yml to change environment defaults.
      dev_config:
        description: 'JSON config object for the Dev environment'
        required: true
        type: string
      intg_config:
        description: 'JSON config object for the Intg environment'
        required: true
        type: string
      uat_config:
        description: 'JSON config object for the UAT environment'
        required: true
        type: string
      frs_config:
        description: 'JSON config object for the FRS environment'
        required: true
        type: string
      perf_config:
        description: 'JSON config object for the Perf environment'
        required: true
        type: string
      prod_config:
        description: 'JSON config object for the Prod environment'
        required: true
        type: string

# ═══════════════════════════════════════════════════════════════════════════════
# Job 1 — Assemble env matrix from named per-env inputs
# ═══════════════════════════════════════════════════════════════════════════════
jobs:
  assemble-env-matrix:
    name: "🗂️ Assemble Env Matrix"
    runs-on: ubuntu-latest
    outputs:
      env_matrix_json: ${{ steps.assemble.outputs.env_matrix_json }}

    steps:
      - name: Assemble ordered env matrix
        id: assemble
        shell: pwsh
        run: |
          # Parse all 6 named env config inputs in promotion order.
          $all = @(
            '${{ inputs.dev_config }}',
            '${{ inputs.intg_config }}',
            '${{ inputs.uat_config }}',
            '${{ inputs.frs_config }}',
            '${{ inputs.perf_config }}',
            '${{ inputs.prod_config }}'
          ) | ForEach-Object {
            try   { $_ | ConvertFrom-Json }
            catch { Write-Error "Failed to parse env config JSON: $_"; exit 1 }
          }

          # Apply environments filter (empty = include all).
          $filter = '${{ inputs.environments }}'.Trim()
          if ($filter -ne '') {
            $names   = $filter -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ }
            $configs = $all | Where-Object { $_.name -in $names }
            if ($configs.Count -eq 0) {
              Write-Error "::error::environments filter '$filter' matched no configured environments."
              exit 1
            }
            Write-Host "environments filter applied: $filter"
          } else {
            $configs = $all
          }

          $compact = ConvertTo-Json @($configs) -Compress -Depth 4
          Write-Host "Assembled env_matrix_json ($($configs.Count) environment(s)):"
          $configs | ForEach-Object { Write-Host "  → $($_.name)  [$($_.url)]" }
          echo "env_matrix_json=$compact" >> $env:GITHUB_OUTPUT

# ═══════════════════════════════════════════════════════════════════════════════
# Job 2 — Deploy chain  (iterates all environments sequentially via strategy.matrix)
# ═══════════════════════════════════════════════════════════════════════════════
  deploy-env:
    name: "Deploy | ${{ matrix.env.name }}"
    needs: assemble-env-matrix
    runs-on: ubuntu-latest

    # environment: drives the GitHub approval gate for each env.
    # Required reviewers configured in Settings → Environments → <name>.
    # No separate gate job needed — the protection rules pause execution here.
    environment: ${{ matrix.env.name }}

    strategy:
      matrix:
        env: ${{ fromJson(needs.assemble-env-matrix.outputs.env_matrix_json) }}
      # max-parallel:1 ensures strictly sequential promotion:
      #   Dev completes → Intg gate fires → Intg completes → UAT gate fires → ...
      max-parallel: 1
      fail-fast: true   # stop the chain if any environment fails

    steps:
      # ── 1. Bootstrap ──────────────────────────────────────────────────────────
      - name: CI Bootstrap
        uses: ppudot2-cloud/GHA-Core/templates/steps/dynamics/ci-bootstrap@main
        with:
          mock_deploy:   ${{ inputs.mock_deploy }}
          jfrog_enabled: ${{ inputs.jfrog_url != '' }}

      # ── 2. Install PAC CLI ────────────────────────────────────────────────────
      - name: Install PAC CLI
        uses: ppudot2-cloud/GHA-Core/templates/steps/dynamics/pac-install@main

      # ── 3. Download solution artifacts ────────────────────────────────────────
      # Phase 1: artifacts were uploaded by _stage-build in the current run.
      # Phase 2/3: artifacts come from the Phase 1 run — source_run_id carries that
      #   run's ID so we can pull across runs. github-token is required for cross-run
      #   downloads. Artifacts retain for 7 days (set in _job-build.yml).
      - name: Download solution artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: solution-artifact-*
          path: .
          merge-multiple: true
          run-id: ${{ inputs.source_run_id != '' && inputs.source_run_id || github.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ── 4. Deploy every solution to this environment ─────────────────────────
      # deploy-all-solutions loops over solutions_json sequentially.
      # Per-env options come from matrix.env (assembled from named config inputs).
      # Common options come from workflow_call inputs.
      - name: "Deploy all solutions → ${{ matrix.env.name }}"
        uses: ppudot2-cloud/GHA-Core/templates/steps/dynamics/deploy-all-solutions@main
        with:
          solutions_json:           ${{ inputs.matrix }}
          environment_name:         ${{ matrix.env.name }}
          environment_url:          ${{ matrix.env.url }}
          solution_type:            ${{ matrix.env.solution_type }}
          enable_backup:            ${{ matrix.env.enable_backup }}
          enable_blocking_check:    ${{ matrix.env.enable_blocking_check }}
          enable_version_compare:   ${{ matrix.env.enable_version_compare }}
          import_config_data:       ${{ matrix.env.import_config_data }}
          previous_environment_url: ${{ matrix.env.previous_url }}
          tag_prod_deployed:        ${{ matrix.env.name == 'Prod' }}
          trigger_upgrade:          ${{ inputs.trigger_upgrade }}
          mock_deploy:              ${{ inputs.mock_deploy }}
          base_solutions:           ${{ inputs.base_solutions }}
          jfrog_url:                ${{ inputs.jfrog_url }}
          jfrog_repo:               ${{ inputs.jfrog_repo }}
          run_number:               ${{ inputs.run_number }}
          run_attempt:              ${{ inputs.run_attempt }}
