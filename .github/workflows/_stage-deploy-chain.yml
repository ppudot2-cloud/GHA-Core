# ═════════════════════════════════════════════════════════════════════════════
# Prod  (always sequential after UAT — Prod gate provides final approval)
#        needs: deploy-uat so Prod never starts until UAT succeeds.
#        If UAT was skipped (not in environments filter), Prod still runs
#        when explicitly included — skipped counts as non-blocking.
#        tag_prod_deployed: true  → JFrog artifact tagged after success
# ═════════════════════════════════════════════════════════════════════════════
  deploy-prod:
    name: "🚀 Deploy | Prod"
    runs-on: ubuntu-latest
    environment: Prod
    needs: [deploy-uat]
    if: >-
      (inputs.environments == '' || contains(inputs.environments, 'Prod')) &&
      (needs.deploy-uat.result == 'success' || needs.deploy-uat.result == 'skipped')
    env:
      GHA_CORE_PAT: ${{ secrets.GHA_CORE_PAT }}

    steps:
      - name: Reveille
        uses: ppudot2-cloud/GHA-Core/.github/actions/dynamics/reveille@main
        with:
          mock_deploy:            ${{ inputs.mock_deploy }}
          jfrog_enabled:          ${{ inputs.jfrog_url != '' }}
          azure_client_id:        ${{ vars.AZURE_CLIENT_ID }}
          azure_tenant_id:        ${{ vars.AZURE_TENANT_ID }}
          azure_subscription_id:  ${{ vars.AZURE_SUBSCRIPTION_ID }}
          azure_key_vault_name:   ${{ vars.AZURE_KEY_VAULT_NAME }}

      - name: Install PAC CLI
        uses: ppudot2-cloud/GHA-Core/.github/actions/dynamics/pac-install@main

      - name: Download solution artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: solution-artifact-*
          path: .
          merge-multiple: true
          run-id: ${{ inputs.source_run_id != '' && inputs.source_run_id || github.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy all solutions → Prod
        uses: ppudot2-cloud/GHA-Core/.github/actions/dynamics/deploy-all-solutions@main
        with:
          solutions_json:           ${{ inputs.matrix }}
          environment_name:         ${{ fromJson(inputs.prod_config).name }}
          environment_url:          ${{ fromJson(inputs.prod_config).url }}
          solution_type:            ${{ fromJson(inputs.prod_config).solution_type }}
          enable_backup:            ${{ fromJson(inputs.prod_config).enable_backup }}
          enable_blocking_check:    ${{ fromJson(inputs.prod_config).enable_blocking_check }}
          enable_version_compare:   ${{ fromJson(inputs.prod_config).enable_version_compare }}
          import_config_data:       ${{ fromJson(inputs.prod_config).import_config_data }}
          previous_environment_url: ${{ fromJson(inputs.prod_config).previous_url }}
          tag_prod_deployed:        true
          mock_deploy:              ${{ inputs.mock_deploy }}
          base_solutions:           ${{ inputs.base_solutions }}
          jfrog_url:                ${{ inputs.jfrog_url }}
          jfrog_repo:               ${{ inputs.jfrog_repo }}
          run_number:               ${{ inputs.run_number }}
          run_attempt:              ${{ inputs.run_attempt }}
