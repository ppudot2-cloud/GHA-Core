# ─────────────────────────────────────────────────────────────────────────────
# _stage-deploy-chain.yml  —  Reusable DEPLOY CHAIN stage
#
# Drives sequential promotion:  Dev → Intg → UAT → FRS → Perf → Prod
#
# WHY EXPLICIT JOBS (not strategy.matrix):
#   strategy.matrix collapses all environments into a single job node in the
#   GitHub Actions UI — individual approval gates are invisible.
#   Each named job here carries  environment: <name>  so GitHub renders a
#   distinct "Waiting for review" gate node per environment when Required
#   Reviewers are configured in Settings → Environments → <name>.
#
# GATE SETUP (one-time, per repo):
#   Settings → Environments → <name> → Required reviewers → add reviewer(s)
#   Once configured, GitHub pauses each job and shows an approval prompt
#   before the runner starts. No extra gate jobs needed.
#
# FAIL-FAST:
#   Each job lists ALL predecessors in needs: and checks
#     !contains(needs.*.result, 'failure')
#   so the chain halts on any environment failure, while a job legitimately
#   skipped by the environments filter is transparent to downstream jobs.
#
# ENVIRONMENT FILTER:
#   Pass  environments: 'Dev,Intg'  to deploy only those two in order.
#   Empty string (default) deploys all 6.
#   Examples:
#     'Dev,Intg,UAT,FRS,Perf'  → Pipeline 1 (pre-prod)
#     'UAT,Prod'                → Pipeline 2 (UAT re-validation + Prod)
#
# INPUT STRUCTURE — two layers:
#   Common inputs:  matrix, mock_deploy, trigger_upgrade, base_solutions,
#                   jfrog_url, jfrog_repo, run_number, run_attempt
#   Per-env inputs: dev_config, intg_config, uat_config, frs_config,
#                   perf_config, prod_config  (compact JSON objects)
#
#   Each *_config carries:
#     name                  — must match a GitHub Environment in repo Settings
#     url                   — Power Platform environment URL
#     previous_url          — URL of the prior environment (version-compare)
#     solution_type         — "Unmanaged" (Dev) or "Managed" (others)
#     enable_backup         — export current solution as backup before import
#     enable_blocking_check — block on active flows / ownership locks
#     enable_version_compare— skip import when installed version >= artifact version
#     import_config_data    — run pac data import after solution import
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_call:
    inputs:
      # ── Solution matrix (from setup job) ──────────────────────────────────
      matrix:
        description: 'JSON array of solution objects from the setup job'
        required: true
        type: string

      # ── Environment filter ────────────────────────────────────────────────
      # Comma-separated list of environment names to include in this run.
      # Empty (default) = deploy all 6 in sequence.
      environments:
        description: 'Comma-separated environment names to deploy (empty = all 6)'
        required: false
        type: string
        default: ''

      # ── Cross-run artifact source ─────────────────────────────────────────
      # Phase 2 passes the Phase 1 run_id so artifacts can be downloaded
      # from that run. Empty (default) = download from the current run.
      source_run_id:
        description: 'GitHub run ID to download solution artifacts from (empty = current run)'
        required: false
        type: string
        default: ''

      # ── Common options ────────────────────────────────────────────────────
      mock_deploy:
        description: 'Simulate all deployments without touching Power Platform'
        required: false
        type: boolean
        default: false
      trigger_upgrade:
        description: 'Use stage-and-upgrade (holding) pattern for managed imports'
        required: false
        type: boolean
        default: false
      base_solutions:
        description: 'Comma-separated base solution names to verify are installed'
        required: false
        type: string
        default: ''
      jfrog_url:
        description: 'JFrog Artifactory base URL (used only for Prod prodDeployed tagging)'
        required: false
        type: string
        default: ''
      jfrog_repo:
        description: 'JFrog repository name'
        required: false
        type: string
        default: 'power-platform'
      run_number:
        description: 'GitHub run number (for deterministic artifact naming)'
        required: true
        type: string
      run_attempt:
        description: 'GitHub run attempt'
        required: true
        type: string

      # ── Per-environment config inputs ─────────────────────────────────────
      # Each is a compact JSON object — see header comment for field reference.
      dev_config:
        description: 'JSON config object for the Dev environment'
        required: true
        type: string
      intg_config:
        description: 'JSON config object for the Intg environment'
        required: true
        type: string
      uat_config:
        description: 'JSON config object for the UAT environment'
        required: true
        type: string
      frs_config:
        description: 'JSON config object for the FRS environment'
        required: true
        type: string
      perf_config:
        description: 'JSON config object for the Perf environment'
        required: true
        type: string
      prod_config:
        description: 'JSON config object for the Prod environment'
        required: true
        type: string

# ═════════════════════════════════════════════════════════════════════════════
# Dev
# ═════════════════════════════════════════════════════════════════════════════
jobs:
  deploy-dev:
    name: "🚀 Deploy | Dev"
    runs-on: ubuntu-latest
    environment: Dev
    # No needs: — first in the chain
    if: inputs.environments == '' || contains(inputs.environments, 'Dev')
    env:
      GHA_CORE_PAT: ${{ secrets.GHA_CORE_PAT }}

    steps:
      - name: CI Bootstrap
        uses: ppudot2-cloud/GHA-Core/.github/actions/ci-bootstrap@main
        with:
          mock_deploy:            ${{ inputs.mock_deploy }}
          jfrog_enabled:          ${{ inputs.jfrog_url != '' }}
          azure_client_id:        ${{ vars.AZURE_CLIENT_ID }}
          azure_tenant_id:        ${{ vars.AZURE_TENANT_ID }}
          azure_subscription_id:  ${{ vars.AZURE_SUBSCRIPTION_ID }}
          azure_key_vault_name:   ${{ vars.AZURE_KEY_VAULT_NAME }}

      - name: Install PAC CLI
        uses: ppudot2-cloud/GHA-Core/.github/actions/pac-install@main

      - name: Download solution artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: solution-artifact-*
          path: .
          merge-multiple: true
          run-id: ${{ inputs.source_run_id != '' && inputs.source_run_id || github.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy all solutions → Dev
        uses: ppudot2-cloud/GHA-Core/.github/actions/deploy-all-solutions@main
        with:
          solutions_json:           ${{ inputs.matrix }}
          environment_name:         ${{ fromJson(inputs.dev_config).name }}
          environment_url:          ${{ fromJson(inputs.dev_config).url }}
          solution_type:            ${{ fromJson(inputs.dev_config).solution_type }}
          enable_backup:            ${{ fromJson(inputs.dev_config).enable_backup }}
          enable_blocking_check:    ${{ fromJson(inputs.dev_config).enable_blocking_check }}
          enable_version_compare:   ${{ fromJson(inputs.dev_config).enable_version_compare }}
          import_config_data:       ${{ fromJson(inputs.dev_config).import_config_data }}
          previous_environment_url: ${{ fromJson(inputs.dev_config).previous_url }}
          tag_prod_deployed:        false
          trigger_upgrade:          ${{ inputs.trigger_upgrade }}
          mock_deploy:              ${{ inputs.mock_deploy }}
          base_solutions:           ${{ inputs.base_solutions }}
          jfrog_url:                ${{ inputs.jfrog_url }}
          jfrog_repo:               ${{ inputs.jfrog_repo }}
          run_number:               ${{ inputs.run_number }}
          run_attempt:              ${{ inputs.run_attempt }}

# ═════════════════════════════════════════════════════════════════════════════
# Intg  (needs Dev — halts if Dev failed)
# ═════════════════════════════════════════════════════════════════════════════
  deploy-intg:
    name: "🚀 Deploy | Intg"
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: Intg
    if: >-
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      (inputs.environments == '' || contains(inputs.environments, 'Intg'))
    env:
      GHA_CORE_PAT: ${{ secrets.GHA_CORE_PAT }}

    steps:
      - name: CI Bootstrap
        uses: ppudot2-cloud/GHA-Core/.github/actions/ci-bootstrap@main
        with:
          mock_deploy:            ${{ inputs.mock_deploy }}
          jfrog_enabled:          ${{ inputs.jfrog_url != '' }}
          azure_client_id:        ${{ vars.AZURE_CLIENT_ID }}
