# =============================================================================
# COMPOSITE ACTION: Export Config Data
# =============================================================================
# Exports configuration/reference data from a Power Platform environment using
# the Configuration Migration tool schema.
#
# WHAT IS CONFIGURATION MIGRATION DATA?
#   Power Platform solutions package *schema* (tables, columns, forms, flows)
#   but not *data* (records). Configuration Migration data covers records that
#   belong to the solution — e.g. lookup values, approval matrices, role mappings,
#   or any reference data that must be consistent across environments.
#   The schema XML (data_schema_file) defines which tables and records to export.
#
# WHEN IS IT USED?
#   Only solutions that carry environment-agnostic reference data need this step.
#   Set dataSchemaFile in solutions.json to the schema path; leave it empty to skip.
#   The exported ZIP (config-data/<name>-data.zip) is included in the
#   solution-artifact uploaded by _job-build and imported at deploy time when
#   import_config_data=true.
#
# BRANCHING LOGIC:
#   data_schema_file != '' + mock_deploy != 'true'  → real export via export-data action
#   data_schema_file != '' + mock_deploy == 'true'  → simulation via Export-ConfigDataSim.ps1
#                                                     (parses schema, creates placeholder ZIP)
#   data_schema_file == ''                          → step skipped entirely
# =============================================================================
name: 'Export Config Data'
description: 'Exports configuration migration data from the source environment'

inputs:
  solution_name:
    description: 'Name of the solution'
    required: true
  data_schema_file:
    description: 'Path to the data schema XML file (empty = skip export)'
    required: false
    default: ''
  source_environment_url:
    description: 'Power Platform environment URL to export data from'
    required: false
    default: ''
  run_number:
    description: 'GitHub run number'
    required: true
  mock_deploy:
    description: 'If true, simulate data export without connecting to Power Platform'
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Export configuration data (real)
      if: ${{ inputs.data_schema_file != '' && inputs.mock_deploy != 'true' }}
      uses: microsoft/powerplatform-actions/export-data@v1
      with:
        environment-url: ${{ inputs.source_environment_url }}
        app-id: ${{ env.PP_APP_ID }}
        client-secret: ${{ env.PP_CLIENT_SECRET }}
        tenant-id: ${{ env.PP_TENANT_ID }}
        schema-file: ${{ inputs.data_schema_file }}
        data-file: config-data/${{ inputs.solution_name }}-data.zip

    - name: Export configuration data (mock)
      if: ${{ inputs.data_schema_file != '' && inputs.mock_deploy == 'true' }}
      shell: pwsh
      run: |
        $scriptPath = "${{ github.action_path }}/../../../../.github/scripts/dynamics/Export-ConfigDataSim.ps1"
        if (-not (Test-Path $scriptPath)) {
          $scriptPath = ".ci/.github/scripts/dynamics/Export-ConfigDataSim.ps1"
        }
        & $scriptPath `
          -SchemaFile    "${{ inputs.data_schema_file }}" `
          -OutputZipPath "config-data/${{ inputs.solution_name }}-data.zip" `
          -RunNumber     "${{ inputs.run_number }}"

    - name: Skip config data export
      if: ${{ inputs.data_schema_file == '' }}
      shell: pwsh
      run: |
        Write-Host "No data schema file specified — skipping config data export." -ForegroundColor Yellow
