# =============================================================================
# COMPOSITE ACTION: Pre-Deploy Checks
# =============================================================================
# Runs three optional safety checks before a solution is imported.
# Each check is individually toggled by an input flag; all are skipped in
# mock_deploy mode.
#
# CHECK 1 — Base solution presence (enable_blocking_check + base_solutions):
#   Verifies that every solution listed in base_solutions is already installed
#   in the target environment. Prevents import failures caused by missing
#   dependencies that the solution package requires at import time.
#
# CHECK 2 — Blocking async operations (enable_blocking_check):
#   Calls Invoke-BlockingCheck.ps1, which queries the Dataverse asyncoperations
#   API for in-progress imports, publishes, or upgrades. Issues a ::warning::
#   annotation but does NOT block the pipeline — gives visibility so the operator
#   can decide whether to wait or proceed.
#
# CHECK 3 — Version comparison (enable_version_compare):
#   Calls Compare-SolutionVersion.ps1 to compare the artifact version against
#   what is already deployed in the target environment. If the installed version
#   is the same or newer, sets skip_import=true on GITHUB_OUTPUT so the calling
#   job bypasses the import step entirely (idempotent re-deploy safety net).
#
# OUTPUT:
#   skip_import — 'true' if version compare determined no import is needed;
#                 'false' otherwise (including when version compare is disabled).
# =============================================================================
name: 'Pre-Deploy Checks'
description: 'Runs blocking checks and version comparison before importing a solution'

inputs:
  solution_name:
    description: 'Name of the solution'
    required: true
  environment_url:
    description: 'Target Power Platform environment URL'
    required: true
  artifact_name:
    description: 'Artifact identifier used to derive version string'
    required: true
  enable_blocking_check:
    description: 'Run blocking-check script (detects active flows, ownership locks, etc.)'
    required: false
    default: 'true'
  enable_version_compare:
    description: 'Skip import if the same or higher version is already installed'
    required: false
    default: 'true'
  base_solutions:
    description: 'Comma-separated list of base solution names to verify are present'
    required: false
    default: ''
  mock_deploy:
    description: 'If true, skip actual environment connectivity checks'
    required: false
    default: 'false'

outputs:
  skip_import:
    description: 'true if version compare determined import should be skipped'
    value: ${{ steps.version-compare.outputs.skip_import }}

runs:
  using: composite
  steps:
    - name: Verify base solutions present
      if: ${{ inputs.base_solutions != '' && inputs.mock_deploy != 'true' }}
      shell: pwsh
      run: |
        $bases = "${{ inputs.base_solutions }}" -split ','
        foreach ($base in $bases) {
          $base = $base.Trim()
          Write-Host "Verifying base solution '$base' is installed in ${{ inputs.environment_url }}..."
          # Uses PAC CLI — fails job if solution not found
          pac solution list --environment "${{ inputs.environment_url }}" | Select-String $base
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Base solution '$base' not found in environment. Cannot proceed."
            exit 1
          }
        }

    - name: Run blocking check
      if: ${{ inputs.enable_blocking_check == 'true' && inputs.mock_deploy != 'true' }}
      shell: pwsh
      run: |
        $scriptPath = ".ci/.github/scripts/dynamics/Invoke-BlockingCheck.ps1"
        & $scriptPath `
          -EnvironmentUrl  "${{ inputs.environment_url }}" `
          -EnvironmentName "${{ inputs.solution_name }}" `
          -AppId           "${{ env.PP_APP_ID }}" `
          -ClientSecret    "${{ env.PP_CLIENT_SECRET }}" `
          -TenantId        "${{ env.PP_TENANT_ID }}"

    - name: Compare solution version
      id: version-compare
      if: ${{ inputs.enable_version_compare == 'true' && inputs.mock_deploy != 'true' }}
      shell: pwsh
      run: |
        $scriptPath = ".ci/.github/scripts/dynamics/Compare-SolutionVersion.ps1"
        $result = & $scriptPath `
          -SolutionName           "${{ inputs.solution_name }}" `
          -ArtifactFolder         "out/${{ inputs.solution_name }}" `
          -PreviousEnvironmentUrl "${{ inputs.environment_url }}" `
          -AppId                  "${{ env.PP_APP_ID }}" `
          -ClientSecret           "${{ env.PP_CLIENT_SECRET }}" `
          -TenantId               "${{ env.PP_TENANT_ID }}"
        echo "skip_import=$result" >> $env:GITHUB_OUTPUT

    - name: Pre-deploy checks (mock)
      if: ${{ inputs.mock_deploy == 'true' }}
      shell: pwsh
      run: |
        Write-Host "[MOCK] Pre-deploy checks skipped — mock_deploy=true" -ForegroundColor Cyan
        echo "skip_import=false" >> $env:GITHUB_OUTPUT
