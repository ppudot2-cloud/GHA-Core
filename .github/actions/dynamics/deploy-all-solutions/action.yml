# ─────────────────────────────────────────────────────────────────────────────
# deploy-all-solutions/action.yml  —  Composite: Deploy ALL solutions to ONE environment
#
# Called by _stage-deploy-chain.yml inside a matrix job that iterates environments
# (strategy.matrix + environment: + max-parallel:1).
#
# Preconditions (handled by the calling job before this action):
#   • reveille has run               → .ci/ checked out, Azure login, AKV secrets in env
#   • pac-install has run           → PAC CLI is on $PATH
#   • download-artifact has run     → solution-artifact-* downloaded to workspace
#                                     (out/<artifactName>/ and config-data/ are present)
#
# Execution order (rationale: pre-flight checks must ALL pass BEFORE ServiceNow
# is opened — opening a CR triggers approval notifications, change windows, and
# audits. Opening one only to discover a blocking async op or that the version is
# already current is wasteful and creates unnecessary noise in ServiceNow):
#
#   STEP A — PAC auth (needed by pre-flight base-solution + blocking checks)
#
#   STEP B — Pre-flight loop (ALL solutions, no ServiceNow involvement):
#     1.  Verify artifact present
#     2.  Resolve deployment-settings tokens
#     3.  Verify base solutions are installed (pac solution list)
#     4.  Blocking check (Invoke-BlockingCheck.ps1)
#     5.  Version compare → sets skip_import flag (Compare-SolutionVersion.ps1)
#   → Writes preflight-results.json with per-solution skip_import flags
#   → Fails immediately if ANY check fails (ServiceNow is never opened)
#
#   STEP C — ServiceNow Pre-Deploy (Open CR + Approval Gate)
#   → Blocks the pipeline until SNOW change request is approved
#   → Only runs if enable_servicenow=true
#   → Only reached after ALL pre-flight checks pass
#
#   STEP D — Deploy loop (ALL solutions, SNOW already approved):
#     6.  Find solution in target env   → first install vs upgrade
#     7.  Backup current solution       → only on upgrades
#     8.  Import: standard or stage-and-upgrade
#     9.  Import configuration migration data (Prod only)
#    10.  Publish customizations
#    11.  Activate Cloud Flows + Classic Workflows
#    12.  Tag JFrog artifact as prodDeployed (Prod only)
#    13.  Write per-solution deploy summary
#
#   STEP E — ServiceNow Post-Deploy (if: always())
#   → Reads SNOW_DEPLOY_STATUS written by deploy loop
#   → Closes CR as successful or unsuccessful
#
#   STEP F — Upload backup artifact (GitHub artifact, 30 day retention)
#
# All steps respect mock_deploy — no Dataverse or JFrog calls are made.
# ─────────────────────────────────────────────────────────────────────────────
name: 'Deploy All Solutions'
description: 'Sequentially deploys every solution in solutions_json to the target environment using PAC CLI'

inputs:
  solutions_json:
    description: 'JSON array of solution objects (name, source_folder, deployment_settings_prefix, ...)'
    required: true
  environment_name:
    description: 'Target environment label (Dev, Intg, UAT, FRS, Perf, Prod)'
    required: true
  environment_url:
    description: 'Target Power Platform environment URL'
    required: true
  solution_type:
    description: 'Import type: Unmanaged (Dev only) or Managed'
    required: false
    default: 'Managed'
  enable_backup:
    description: 'Export current solution as backup before import'
    required: false
    default: 'false'
  enable_blocking_check:
    description: 'Run Invoke-BlockingCheck.ps1 before import'
    required: false
    default: 'false'
  enable_version_compare:
    description: 'Skip import when installed version >= artifact version'
    required: false
    default: 'false'
  import_config_data:
    description: 'Import configuration migration data after solution import'
    required: false
    default: 'false'
  mock_deploy:
    description: 'Simulate all steps — no Dataverse or JFrog calls'
    required: false
    default: 'false'
  tag_prod_deployed:
    description: 'Tag JFrog artifact with prodDeployed=true after success (set true for Prod only)'
    required: false
    default: 'false'
  previous_environment_url:
    description: 'URL of the prior environment (used by version compare to check promotion chain)'
    required: false
    default: ''
  base_solutions:
    description: 'Comma-separated base solution names to verify are installed before import'
    required: false
    default: ''
  jfrog_url:
    description: 'JFrog Artifactory base URL — used only for Prod prodDeployed tagging, not for artifact download'
    required: false
    default: ''
  jfrog_repo:
    description: 'JFrog repository name'
    required: false
    default: 'power-platform'
  activate_flows:
    description: 'Activate all Cloud Flows in every solution after import'
    required: false
    default: 'true'
  run_number:
    description: 'GitHub run number — part of the deterministic artifact name'
    required: true
  run_attempt:
    description: 'GitHub run attempt'
    required: false
    default: '1'
  enable_servicenow:
    description: >
      Enable ServiceNow change management for this deployment.
      When true: opens a CR before deployment, polls for approval, and closes the
      CR after deployment. Must have servicenow_enabled=true in reveille so
      AKV credentials (SERVICENOWMURI, SNOW_OAUTH_CLIENT_ID/SECRET) are available.
      NOTE: ServiceNow is only opened AFTER all pre-flight checks pass.
    required: false
    default: 'false'
  solution_list:
    description: 'Comma-separated solution names — included in ServiceNow CR description'
    required: false
    default: ''
  sarif_path:
    description: >
      Path to the Solution Checker SARIF report — attached as an audit trail
      artifact to the ServiceNow change request (optional).
    required: false
    default: ''

runs:
  using: composite
  steps:

    # ── STEP A: PAC auth ──────────────────────────────────────────────────────
    # Authenticates PAC CLI before pre-flight checks run.
    # Base-solution verification (step 3) and version compare (step 5) both
    # need PAC CLI to query the target environment.
    - name: PAC auth — ${{ inputs.environment_name }}
      shell: pwsh
      run: |
        if ("${{ inputs.mock_deploy }}" -eq "true") {
          Write-Host "[MOCK] Skipping PAC auth for ${{ inputs.environment_name }}" -ForegroundColor Cyan
        } else {
          Write-Host "Authenticating PAC CLI → ${{ inputs.environment_name }}"
          pac auth create `
            --name    "target-${{ inputs.environment_name }}" `
            --url     "${{ inputs.environment_url }}" `
            --applicationId "$env:PP_APP_ID" `
            --clientSecret  "$env:PP_CLIENT_SECRET" `
            --tenant        "$env:PP_TENANT_ID"
          pac auth select --name "target-${{ inputs.environment_name }}"
        }

    # ── STEP B: Pre-flight checks (ALL solutions, before ServiceNow) ──────────
    # INFORMATIONAL ONLY — these checks never fail the pipeline.
    # They run before ServiceNow so the user can see environment health in the
    # GitHub Actions log before a CR is opened. Any issues found are logged as
    # ⚠️ warnings; the deployment proceeds regardless. If the environment truly
    # cannot accept the import (e.g. blocking op, missing base solution), the
    # actual pac solution import in the deploy loop will surface a clear error.
    #
    # Writes preflight-results.json with per-solution skip_import flags so the
    # deploy loop can respect version-compare decisions made here.
    - name: Pre-flight checks (informational) — ${{ inputs.environment_name }}
      shell: pwsh
      env:
        SOLUTIONS_JSON:            ${{ inputs.solutions_json }}
        ENVIRONMENT_NAME:          ${{ inputs.environment_name }}
        ENVIRONMENT_URL:           ${{ inputs.environment_url }}
        ENABLE_BLOCKING_CHECK:     ${{ inputs.enable_blocking_check }}
        ENABLE_VERSION_COMPARE:    ${{ inputs.enable_version_compare }}
        MOCK_DEPLOY:               ${{ inputs.mock_deploy }}
        BASE_SOLUTIONS:            ${{ inputs.base_solutions }}
        RUN_NUMBER:                ${{ inputs.run_number }}
        RUN_ATTEMPT:               ${{ inputs.run_attempt }}
        PREVIOUS_ENV_URL:          ${{ inputs.previous_environment_url }}
      run: |
        # No ErrorActionPreference = Stop — pre-flight checks are informational only.
        # All errors are caught and logged as warnings; the step always exits 0.
        $isMock   = $env:MOCK_DEPLOY -eq 'true'
        $envName  = $env:ENVIRONMENT_NAME
        $envUrl   = $env:ENVIRONMENT_URL
        $envLower = $envName.ToLower()

        $scriptsDir = "$env:GITHUB_WORKSPACE/.ci/.github/scripts/dynamics"

        $parsed    = $env:SOLUTIONS_JSON | ConvertFrom-Json
        $solutions = if ($parsed.solution) { $parsed.solution } else { $parsed }

        $results  = [System.Collections.Generic.List[hashtable]]::new()
        $warnings = [System.Collections.Generic.List[string]]::new()

        Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        Write-Host "  PRE-FLIGHT CHECKS (informational) — $($solutions.Count) solution(s) → $envName"
        Write-Host "  Results are advisory only. Deployment will proceed regardless."
        Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

        foreach ($sol in $solutions) {
          $name             = $sol.name
          $prefix           = if ($sol.deployment_settings_prefix) { $sol.deployment_settings_prefix } else { 'deployment-settings' }
          $outDir           = "out/$name"
          $settingsFile     = "$prefix/$envLower/$name.json"
          $settingsResolved = "$outDir/deployment-settings-resolved.json"
          $skipImport       = $false

          Write-Host ""
          Write-Host "::group::[$name] Pre-flight → $envName"

          # ── 1. Verify artifact present ─────────────────────────────────────
          Write-Host "[$name] Pre-flight 1/5 — Verify artifact present"
          $managedZip = (Get-ChildItem -Path $outDir -Filter "*_managed.zip" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName)
          if ($isMock) {
            Write-Host "  [MOCK] Skipping artifact check" -ForegroundColor Cyan
            New-Item -ItemType Directory -Force -Path $outDir | Out-Null
            $managedZip = "$outDir/${name}_mock_managed.zip"
            New-Item -ItemType File -Force -Path $managedZip | Out-Null
          } elseif (-not $managedZip -or -not (Test-Path $managedZip)) {
            $msg = "[$name] ⚠️  Managed ZIP not found in '$outDir' — download-artifact may have failed or artifact name mismatch"
            Write-Warning $msg
            $warnings.Add($msg)
          } else {
            Write-Host "  ✓ Artifact found: $managedZip"
          }

          # ── 2. Resolve deployment-settings tokens ──────────────────────────
          Write-Host "[$name] Pre-flight 2/5 — Resolve deployment settings"
          if ((Test-Path $settingsFile) -and -not $isMock) {
            try {
              $content = Get-Content $settingsFile -Raw
              $tokenMatches = [regex]::Matches($content, '#\{([^}]+)\}#')
              foreach ($m in $tokenMatches) {
                $varName  = $m.Groups[1].Value
                $varValue = [System.Environment]::GetEnvironmentVariable($varName)
                if ($null -ne $varValue) {
                  $content = $content.Replace($m.Value, $varValue)
                } else {
                  $msg = "[$name] ⚠️  Token $($m.Value) has no matching env var '$varName' — will be left unreplaced in settings"
                  Write-Warning $msg
                  $warnings.Add($msg)
                }
              }
              New-Item -ItemType Directory -Force -Path $outDir | Out-Null
              $content | Set-Content $settingsResolved -Encoding UTF8
              Write-Host "  ✓ Resolved settings written to: $settingsResolved"
            } catch {
              $msg = "[$name] ⚠️  Could not resolve deployment settings: $_"
              Write-Warning $msg
              $warnings.Add($msg)
              $settingsResolved = ''
            }
          } else {
            $settingsResolved = ''
            if ($isMock) { Write-Host "  [MOCK] Token resolution skipped" -ForegroundColor Cyan }
            else          { Write-Host "  No settings file at $settingsFile — skipping" -ForegroundColor Yellow }
          }

          # ── 3. Verify base solutions ───────────────────────────────────────
          Write-Host "[$name] Pre-flight 3/5 — Verify base solutions"
          if ($env:BASE_SOLUTIONS -ne '' -and -not $isMock) {
            $bases = $env:BASE_SOLUTIONS -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne '' }
            foreach ($base in $bases) {
              Write-Host "  Checking '$base' in $envName..."
              try {
                $list = pac solution list --environment $envUrl 2>&1
                if ($list -notmatch [regex]::Escape($base)) {
                  $msg = "[$name] ⚠️  Base solution '$base' not found in $envName — import will likely fail if it is a hard dependency"
                  Write-Warning $msg
                  $warnings.Add($msg)
                } else {
                  Write-Host "  ✓ '$base' found"
                }
              } catch {
                $msg = "[$name] ⚠️  Could not query solution list to verify '$base': $_"
                Write-Warning $msg
                $warnings.Add($msg)
              }
            }
          } elseif ($isMock) {
            Write-Host "  [MOCK] Base solution check skipped" -ForegroundColor Cyan
          } else {
            Write-Host "  No base solutions specified — skipping"
          }

          # ── 4. Blocking check ──────────────────────────────────────────────
          Write-Host "[$name] Pre-flight 4/5 — Blocking check"
          if ($env:ENABLE_BLOCKING_CHECK -eq 'true' -and -not $isMock) {
            try {
              & "$scriptsDir/Invoke-BlockingCheck.ps1" `
                -EnvironmentUrl  $envUrl `
                -EnvironmentName $name `
                -AppId           $env:PP_APP_ID `
                -ClientSecret    $env:PP_CLIENT_SECRET `
                -TenantId        $env:PP_TENANT_ID
            } catch {
              $msg = "[$name] ⚠️  Blocking check detected an issue: $_ — the import may conflict with an in-progress Dataverse operation"
              Write-Warning $msg
              $warnings.Add($msg)
            }
          } elseif ($isMock) {
            Write-Host "  [MOCK] Blocking check skipped" -ForegroundColor Cyan
          } else {
            Write-Host "  enable_blocking_check=false — skipping"
          }

          # ── 5. Version compare ─────────────────────────────────────────────
          Write-Host "[$name] Pre-flight 5/5 — Version compare"
          if ($env:ENABLE_VERSION_COMPARE -eq 'true' -and -not $isMock) {
            try {
              $result = & "$scriptsDir/Compare-SolutionVersion.ps1" `
                -SolutionName           $name `
                -ArtifactFolder         $outDir `
                -PreviousEnvironmentUrl $env:PREVIOUS_ENV_URL `
                -TargetEnvironmentUrl   $envUrl `
                -AppId                  $env:PP_APP_ID `
                -ClientSecret           $env:PP_CLIENT_SECRET `
                -TenantId               $env:PP_TENANT_ID
              $skipImport = ($result -eq 'true')
              if ($skipImport) {
                Write-Host "  ℹ️  Version already current in $envName — import will be skipped by the deploy loop" -ForegroundColor Yellow
              } else {
                Write-Host "  ✓ Artifact is newer than installed version — import will proceed"
              }
            } catch {
              $msg = "[$name] ⚠️  Version compare failed: $_ — proceeding with import anyway"
              Write-Warning $msg
              $warnings.Add($msg)
            }
          } elseif ($isMock) {
            Write-Host "  [MOCK] Version compare skipped" -ForegroundColor Cyan
          } else {
            Write-Host "  enable_version_compare=false — skipping"
          }

          Write-Host "::endgroup::"

          $results.Add(@{
            name             = $name
            skipImport       = $skipImport
            settingsResolved = $settingsResolved
            managedZip       = $managedZip
          })
        }

        # Write pre-flight results for the deploy loop to consume
        $results | ConvertTo-Json -Depth 5 | Set-Content "preflight-results.json" -Encoding UTF8

        # ── Summary ────────────────────────────────────────────────────────────
        Write-Host ""
        Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        if ($warnings.Count -gt 0) {
          Write-Host "  ⚠️  Pre-flight complete — $($warnings.Count) advisory warning(s):" -ForegroundColor Yellow
          foreach ($w in $warnings) { Write-Host "     • $w" -ForegroundColor Yellow }
          Write-Host "  Deployment will continue. Review warnings above to anticipate potential import failures." -ForegroundColor Yellow
        } else {
          Write-Host "  ✅ Pre-flight complete — no issues found for $($solutions.Count) solution(s)"
        }
        Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    # ── STEP C: ServiceNow Pre-Deploy (Open CR + Approval Gate) ──────────────
    # Reached after pre-flight checks (informational, never blocking).
    # Blocks the pipeline until the SNOW change request is approved.
    # ── STEP C: ServiceNow Pre-Deploy (Open CR + Approval Gate) ──────────────
    # Only reached after ALL pre-flight checks have passed.
    # Blocks the pipeline until the SNOW change request is approved.
    - name: ServiceNow — Pre-Deploy (Open CR + Approval Gate)
      if: ${{ inputs.enable_servicenow == 'true' }}
      uses: ppudot2-cloud/GHA-Core/.github/actions/dynamics/servicenow-change@main
      with:
        phase:            pre-deploy
        environment_name: ${{ inputs.environment_name }}
        solution_list:    ${{ inputs.solution_list }}
        sarif_path:       ${{ inputs.sarif_path }}
        mock_deploy:      ${{ inputs.mock_deploy }}

    # ── STEP D: Deploy loop (ALL solutions, SNOW already approved) ─────────────
    # Reads preflight-results.json for per-solution skip_import flags and
    # resolved settings paths written by the pre-flight step.
    - name: Deploy solutions → ${{ inputs.environment_name }}
      shell: pwsh
      env:
        SOLUTIONS_JSON:            ${{ inputs.solutions_json }}
        ENVIRONMENT_NAME:          ${{ inputs.environment_name }}
        ENVIRONMENT_URL:           ${{ inputs.environment_url }}
        SOLUTION_TYPE:             ${{ inputs.solution_type }}
        ENABLE_BACKUP:             ${{ inputs.enable_backup }}
        IMPORT_CONFIG_DATA:        ${{ inputs.import_config_data }}
        ACTIVATE_FLOWS:            ${{ inputs.activate_flows }}
        MOCK_DEPLOY:               ${{ inputs.mock_deploy }}
        TAG_PROD_DEPLOYED:         ${{ inputs.tag_prod_deployed }}
        JFROG_URL:                 ${{ inputs.jfrog_url }}
        JFROG_REPO:                ${{ inputs.jfrog_repo }}
        RUN_NUMBER:                ${{ inputs.run_number }}
        RUN_ATTEMPT:               ${{ inputs.run_attempt }}
      run: |
        Set-StrictMode -Version Latest
        $ErrorActionPreference = 'Stop'

        $scriptsDir = "$env:GITHUB_WORKSPACE/.ci/.github/scripts/dynamics"
        $isMock     = $env:MOCK_DEPLOY -eq 'true'
        $envName    = $env:ENVIRONMENT_NAME
        $envUrl     = $env:ENVIRONMENT_URL

        $parsed    = $env:SOLUTIONS_JSON | ConvertFrom-Json
        $solutions = if ($parsed.solution) { $parsed.solution } else { $parsed }

        # Load pre-flight results written by the pre-flight step
        if (-not (Test-Path "preflight-results.json")) {
          throw "preflight-results.json not found. The pre-flight step must run before this step."
        }
        $preflightData = Get-Content "preflight-results.json" -Raw | ConvertFrom-Json
        # Build lookup hashtable keyed by solution name
        $preflight = @{}
        foreach ($r in $preflightData) {
          $preflight[$r.name] = $r
        }

        $failed = [System.Collections.Generic.List[string]]::new()

        Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        Write-Host "  DEPLOYING $($solutions.Count) solution(s) → $envName"
        Write-Host "  (Pre-flight checks passed • ServiceNow CR approved)"
        Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

        foreach ($sol in $solutions) {
          $name       = $sol.name
          $outDir     = "out/$name"
          $dataZip    = "config-data/$name-data.zip"
          $backupDir  = "backup"

          # Read pre-flight results for this solution
          $pf               = $preflight[$name]
          $skipImport       = [bool]$pf.skipImport
          $managedZip       = $pf.managedZip
          $settingsResolved = $pf.settingsResolved

          Write-Host ""
          Write-Host "::group::[$name] Deploy → $envName"

          try {
            # ── 6. Find solution in target environment ─────────────────────────
            Write-Host "[$name] Step 6/8 — Find solution in $envName"
            $solutionExists   = $false
            $installedVersion = ''
            if ($isMock) {
              Write-Host "  [MOCK] Solution lookup simulated — treating as first install" -ForegroundColor Cyan
            } else {
              try {
                $listRaw  = pac solution list --environment $envUrl --json 2>&1
                $allSols  = $listRaw | ConvertFrom-Json
                $existing = $allSols | Where-Object {
                  ($_.SolutionUniqueName -ieq $name) -or ($_.UniqueName -ieq $name)
                }
                if ($existing) {
                  $solutionExists   = $true
                  $installedVersion = $existing.Version ?? $existing.version ?? 'unknown'
                  Write-Host "  ✅ Found '$name' in $envName — installed: $installedVersion → UPGRADE"
                } else {
                  Write-Host "  ℹ️  '$name' not found in $envName → FIRST INSTALL"
                }
              } catch {
                Write-Warning "  Could not query solution list: $_ — continuing (assuming may or may not exist)"
              }
            }
            $effectiveUpgrade = $solutionExists
            $importMode = if ($effectiveUpgrade) { 'UPGRADE (holding solution)' } else { 'INSTALL (standard)' }
            Write-Host "  → Import mode: $importMode"

            # ── 7. Backup ──────────────────────────────────────────────────────
            Write-Host "[$name] Step 7/8 — Backup"
            if ($env:ENABLE_BACKUP -eq 'true' -and -not $skipImport -and $solutionExists) {
              if ($isMock) {
                Write-Host "  [MOCK] Backup of $name from $envName simulated" -ForegroundColor Cyan
              } else {
                New-Item -ItemType Directory -Force -Path $backupDir | Out-Null
                $backupPath = "$backupDir/${name}_${envName}_backup.zip"
                Write-Host "  Exporting backup → $backupPath"
                pac solution export --name $name --path $backupPath --managed --environment $envUrl
                Write-Host "  ✓ Backup exported"
              }
            } elseif ($env:ENABLE_BACKUP -eq 'true' -and -not $solutionExists -and -not $skipImport) {
              Write-Host "  Backup skipped — first install (no previous version to back up)" -ForegroundColor Yellow
            } elseif ($skipImport) {
              Write-Host "  Backup skipped — import will be skipped (version already current)"
            } else {
              Write-Host "  enable_backup=false — skipping"
            }

            # ── 8. Import solution ─────────────────────────────────────────────
            Write-Host "[$name] Step 8/8 — Import"
            if ($skipImport) {
              Write-Host "  ⏭ Import skipped — version already current" -ForegroundColor Yellow
            } elseif ($isMock) {
              Write-Host "  [MOCK] Import of $name → $envName simulated" -ForegroundColor Cyan
              Write-Host "    solution_type : $($env:SOLUTION_TYPE)"
              Write-Host "    import_mode   : $importMode"
              Write-Host "    settings_file : $settingsResolved"
            } else {
              $importArgs = @('solution','import','--path',$managedZip,'--environment',$envUrl,'--force-overwrite')
              if ($settingsResolved -ne '') { $importArgs += @('--settings-file', $settingsResolved) }
              if ($effectiveUpgrade) {
                $importArgs += '--import-as-holding'
                Write-Host "  Importing as holding (stage-and-upgrade)..."
              } else {
                Write-Host "  Importing (standard install)..."
              }
              pac @importArgs
              if ($effectiveUpgrade) {
                Write-Host "  Applying solution upgrade..."
                pac solution upgrade --solution-name $name --environment $envUrl --async
              }
            }

            # ── 9. Import configuration data ───────────────────────────────────
            Write-Host "[$name] Step 9 — Config data"
            if ($env:IMPORT_CONFIG_DATA -eq 'true' -and -not $skipImport) {
              if ($isMock) {
                Write-Host "  [MOCK] Config data import simulated" -ForegroundColor Cyan
              } elseif (Test-Path $dataZip) {
                Write-Host "  Importing config data from $dataZip"
                pac data import --path $dataZip --environment $envUrl
                Write-Host "  ✓ Config data imported"
              } else {
                Write-Warning "  import_config_data=true but $dataZip not found — skipping"
              }
            } else {
              Write-Host "  import_config_data=false or import skipped — skipping"
            }

            # ── 10. Publish customizations ─────────────────────────────────────
            Write-Host "[$name] Step 10 — Publish customizations"
            if ($skipImport) {
              Write-Host "  Publish skipped — import skipped"
            } elseif ($effectiveUpgrade) {
              Write-Host "  Publish skipped — upgrade publishes atomically via apply-upgrade"
            } elseif ($isMock) {
              Write-Host "  [MOCK] Publish customizations simulated" -ForegroundColor Cyan
            } else {
              Write-Host "  Publishing customizations..."
              pac solution publish --environment $envUrl
              Write-Host "  ✓ Customizations published"
            }

            # ── 11. Activate Flows and Classic Workflows ───────────────────────
            Write-Host "[$name] Step 11 — Activate flows & classic workflows"
            if ($skipImport) {
              Write-Host "  Activate skipped — import skipped"
            } elseif ($env:ACTIVATE_FLOWS -ne 'true') {
              Write-Host "  activate_flows=false — skipping"
            } elseif ($isMock) {
              Write-Host "  [MOCK] Flow + classic workflow activation simulated" -ForegroundColor Cyan
            } else {
              $extractDir = "$outDir/_extracted"
              if (Test-Path $extractDir) { Remove-Item $extractDir -Recurse -Force }
              New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
              $zipToExtract = $managedZip
              if (-not (Test-Path $zipToExtract)) {
                $zipToExtract = (Get-ChildItem -Path $outDir -Filter "*_unmanaged.zip" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName)
              }
              if (-not $zipToExtract -or -not (Test-Path $zipToExtract)) {
                Write-Warning "  No solution ZIP found at '$outDir' — skipping flow activation"
              } else {
                Expand-Archive -LiteralPath $zipToExtract -DestinationPath $extractDir -Force
                Write-Host "  ✓ Extracted: $zipToExtract"
                $workflowsDir = Join-Path $extractDir "Workflows"

                # A. Power Automate cloud flows (.json)
                Write-Host "  [A] Power Automate cloud flows (.json)"
                $flowFiles = if (Test-Path $workflowsDir) { Get-ChildItem -Path $workflowsDir -Filter "*.json" -ErrorAction SilentlyContinue } else { @() }
                if ($flowFiles.Count -gt 0) {
                  $activatedFlows = 0; $skippedFlows = 0
                  foreach ($ff in $flowFiles) {
                    $flowId = $null
                    if ($ff.BaseName -match '([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})$') {
                      $flowId = $matches[1]
                    }
                    if (-not $flowId) { Write-Warning "    Cannot extract flow ID from $($ff.Name) — skipping"; continue }
                    try { pac flow enable --flow-id $flowId --environment $envUrl; $activatedFlows++ }
                    catch { Write-Warning "    Could not enable flow $flowId`: $_"; $skippedFlows++ }
                  }
                  Write-Host "    ✓ Cloud flows: $activatedFlows enabled, $skippedFlows skipped"
                } else { Write-Host "    No cloud flow files (.json) found" }

                # B. Classic Dynamics 365 workflows (.xaml)
                Write-Host "  [B] Classic Dynamics 365 workflows (.xaml)"
                $xamlFiles = if (Test-Path $workflowsDir) { Get-ChildItem -Path $workflowsDir -Filter "*.xaml" -ErrorAction SilentlyContinue } else { @() }
                if ($xamlFiles.Count -gt 0) {
                  $tokenUrl  = "https://login.microsoftonline.com/$env:PP_TENANT_ID/oauth2/v2.0/token"
                  $tokenBody = @{ grant_type='client_credentials'; client_id=$env:PP_APP_ID; client_secret=$env:PP_CLIENT_SECRET; scope="$envUrl/.default" }
                  $bearerToken = (Invoke-RestMethod -Uri $tokenUrl -Method POST -Body $tokenBody).access_token
                  $apiHeaders  = @{ Authorization="Bearer $bearerToken"; 'OData-MaxVersion'='4.0'; 'OData-Version'='4.0'; Accept='application/json'; 'Content-Type'='application/json' }
                  $activatedWf = 0; $skippedWf = 0
                  foreach ($xf in $xamlFiles) {
                    $wfId = $null
                    if ($xf.BaseName -match '([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})$') { $wfId = $matches[1] }
                    if (-not $wfId) { Write-Warning "    Cannot extract workflow ID from $($xf.Name) — skipping"; continue }
                    try {
                      $wfRecord = Invoke-RestMethod -Uri "$envUrl/api/data/v9.2/workflows($wfId)?`$select=name,statecode,statuscode" -Headers $apiHeaders -Method GET
                      if ($wfRecord.statecode -eq 1) { Write-Host "      ⏭ Already active: $($wfRecord.name)"; $skippedWf++ }
                      else {
                        Invoke-RestMethod -Uri "$envUrl/api/data/v9.2/workflows($wfId)" -Headers $apiHeaders -Method PATCH -Body '{"statecode":1,"statuscode":2}' | Out-Null
                        Write-Host "      ▶ Activated: $($wfRecord.name)"; $activatedWf++
                      }
                    } catch { Write-Warning "      Failed to activate workflow $wfId`: $_" }
                  }
                  Write-Host "    ✓ Classic workflows: $activatedWf activated, $skippedWf already active"
                } else { Write-Host "    No classic workflow files (.xaml) found" }

                Remove-Item $extractDir -Recurse -Force -ErrorAction SilentlyContinue
              }
            }

            # ── 12. JFrog Prod tag ─────────────────────────────────────────────
            Write-Host "[$name] Step 12 — JFrog Prod tag"
            if ($env:TAG_PROD_DEPLOYED -eq 'true' -and -not $isMock -and $env:JFROG_URL -ne '') {
              & "$scriptsDir/Invoke-JFrogAction.ps1" `
                -Action        "tag" `
                -SolutionName  $name `
                -RepoName      $env:GITHUB_REPOSITORY `
                -JFrogUrl      $env:JFROG_URL `
                -JFrogRepo     $env:JFROG_REPO `
                -RunNumber     $env:RUN_NUMBER `
                -RunAttempt    $env:RUN_ATTEMPT `
                -JFrogToken    $env:JFROG_TOKEN `
                -TagProperties "prodDeployed=true"
            }

            # ── 13. Deploy summary ─────────────────────────────────────────────
            Write-Host "[$name] Step 13 — Deploy summary"
            & "$scriptsDir/Write-DeploySummary.ps1" `
              -SolutionName    $name `
              -EnvironmentName $envName `
              -EnvironmentUrl  $envUrl `
              -RunNumber       $env:RUN_NUMBER `
              -MockDeploy:$isMock

            Write-Host "  ✅ [$name] Deployed successfully → $envName"

          } catch {
            $failed.Add($name)
            Write-Error "❌ [$name] Failed to deploy to $envName`: $_"

            # Inline auto-rollback — only for upgrades where a backup was taken
            if ($env:ENABLE_BACKUP -eq 'true' -and $solutionExists) {
              $backupPath = "$backupDir/${name}_${envName}_backup.zip"
              if (-not $isMock -and (Test-Path $backupPath)) {
                Write-Host ""
                Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Yellow
                Write-Host "  ⚠️  AUTO-ROLLBACK — [$name] → $envName" -ForegroundColor Yellow
                Write-Host "  Restoring: $backupPath" -ForegroundColor Yellow
                Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" -ForegroundColor Yellow
                try {
                  pac solution import --path $backupPath --environment $envUrl --force-overwrite
                  Write-Host "  ✅ [$name] Rollback succeeded — previous version restored" -ForegroundColor Green
                } catch {
                  Write-Error "  ❌ [$name] Auto-rollback also failed: $_ — manual intervention required"
                }
              } elseif ($isMock) {
                Write-Host "  [MOCK] Auto-rollback simulated for $name → $envName" -ForegroundColor Cyan
              } else {
                Write-Warning "  [$name] enable_backup=true but backup file not found at $backupPath"
              }
            } else {
              Write-Host "  [$name] enable_backup=false or first install — no auto-rollback" -ForegroundColor Yellow
            }
          } finally {
            Write-Host "::endgroup::"
          }
        }

        Write-Host ""
        Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        if ($failed.Count -gt 0) {
          "SNOW_DEPLOY_STATUS=failure" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Error "Deploy to $envName FAILED for: $($failed -join ', ')"
          exit 1
        }
        "SNOW_DEPLOY_STATUS=success" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        Write-Host "  ✅ All $($solutions.Count) solution(s) deployed → $envName"
        Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    # ── STEP E: ServiceNow Post-Deploy ────────────────────────────────────────
    # Always runs (if: always()) so the CR is closed even when deployment fails.
    # Reads SNOW_DEPLOY_STATUS written by the deploy loop above.
    # No-op if pre-deploy never ran (SNOW_CHANGE_REQUEST_ID will be empty).
    - name: ServiceNow — Post-Deploy (Find Approvers + Detect Status + Close CR)
      if: ${{ always() && inputs.enable_servicenow == 'true' }}
      uses: ppudot2-cloud/GHA-Core/.github/actions/dynamics/servicenow-change@main
      with:
        phase:            post-deploy
        environment_name: ${{ inputs.environment_name }}
        mock_deploy:      ${{ inputs.mock_deploy }}

    # ── STEP F: Upload backup artifacts ──────────────────────────────────────
    - name: Upload backup artifact — ${{ inputs.environment_name }}
      if: ${{ inputs.enable_backup == 'true' && inputs.mock_deploy != 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: backup-${{ inputs.environment_name }}-v${{ inputs.run_number }}
        path: backup/
        retention-days: 30
        if-no-files-found: warn
